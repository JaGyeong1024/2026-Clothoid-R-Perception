name: clothoid
channels:
  - conda-forge
dependencies:
  # ROS Noetic uses Python 3.8 on Ubuntu 20.04.
  - python=3.8

  # ROS Python tooling used by catkin wrappers and launch-time imports.
  # rospy/sensor_msgs/cv_bridge still come from the sourced ROS Noetic environment.
  - catkin_pkg
  - empy
  - rospkg
  - pyyaml

  # Shared perception runtime dependencies.
  - numpy=1.24.*
  - scipy=1.10.*
  - scikit-learn=1.3.*
  - pip

  - pip:
      # OC-SORT runtime dependencies.
      - filterpy==1.4.5
      - lap==0.5.12
